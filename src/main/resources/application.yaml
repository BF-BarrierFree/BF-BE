spring:
  datasource:
    # 시스템 속성(로컬) 또는 OS 환경 변수(배포)에서 가져옴
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update 
    properties:
      hibernate:
        show_sql: true
        format_sql: true
        use_sql_comments: true

app:
  url: ${APP_URL:http://localhost:8080}